services:
  backend:
    depends_on:
      mongo:
        condition: service_started
    environment:
      MONGODB_URI: mongodb://mongo:27017/TaskFlow

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ../database/init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped

volumes:
  mongo_data:
